name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    env:
      ANDROID_NDK_VERSION: r26b
      ANDROID_API: 21
      
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd node-pty
          npm install
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip -O ndk.zip
          unzip -q ndk.zip
          
      - name: Build for Android ARM64
        run: |
          NDK=$HOME/android-ndk/android-ndk-${{ env.ANDROID_NDK_VERSION }}
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export PATH=$TOOLCHAIN:$PATH
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export LD=aarch64-linux-android21-ld
          export AR=aarch64-linux-android-ar
          export RANLIB=aarch64-linux-android-ranlib
          export SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          
          export CFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target aarch64-linux-android21 -fPIC -Wall"
          export CXXFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target aarch64-linux-android21 -fPIC -stdlib=libc++ -Wall"
          export LDFLAGS="--sysroot=$SYSROOT -target aarch64-linux-android21 -L$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/21 -lc++_shared"
          export CPPFLAGS="--sysroot=$SYSROOT"
          export ac_cv_func_getpwent=no
          export ac_cv_func_getpwnam=no
          export ac_cv_func_getpwuid=no
          export gyp_cv_sysroot="$SYSROOT"
          
          cd node-pty
          npm run prebuild-install -- --arch=arm64 2>&1 || echo "prebuild-install skipped"
          node-gyp configure --arch=arm64 --release 2>&1 | tail -20
          node-gyp build --arch=arm64 --release 2>&1 | tail -30
        timeout-minutes: 30
        
      - name: Verify architecture
        run: |
          file node-pty/build/Release/pty.node 2>/dev/null || find /home/runner/work -name "pty.node" -exec file {} \;
          
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: node-pty/build/Release/pty.node
          retention-days: 30
          
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: node-pty/build/**/*.log
          retention-days: 7

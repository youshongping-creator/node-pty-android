name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    env:
      ANDROID_NDK_VERSION: r26b
      ANDROID_API: 21
      
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd node-pty
          npm install
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip -O ndk.zip
          unzip -q ndk.zip
          ls -la $HOME/android-ndk/
          
      - name: Create standalone toolchain
        env:
          ANDROID_NDK: ${{ runner.temp }}/android-ndk/android-ndk-${{ env.ANDROID_NDK_VERSION }}
        run: |
          echo "Using NDK at: $ANDROID_NDK"
          ls -la $ANDROID_NDK/build/tools/ 2>/dev/null || echo "Checking alternative..."
          ls -la $HOME/android-ndk/android-ndk-${{ env.ANDROID_NDK_VERSION }}/build/tools/ 2>/dev/null
          mkdir -p $HOME/android-toolchain
          $HOME/android-ndk/android-ndk-${{ env.ANDROID_NDK_VERSION }}/build/tools/make-standalone-toolchain.sh \
            --arch=arm64 \
            --platform=${{ env.ANDROID_API }} \
            --install-dir=$HOME/android-toolchain
          ls -la $HOME/android-toolchain/bin/ | head -5
          
      - name: Build for Android ARM64
        env:
          PATH: ${{ runner.temp }}/android-toolchain/bin:$PATH
        run: |
          export PATH=$HOME/android-toolchain/bin:$PATH
          which aarch64-linux-android21-clang
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export LD=aarch64-linux-android21-ld
          export CFLAGS="-target aarch64-linux-android21 -fPIC"
          export CXXFLAGS="-target aarch64-linux-android21 -fPIC -stdlib=libc++"
          export LDFLAGS="-target aarch64-linux-android21"
          
          cd node-pty
          node-gyp configure --arch=arm64 --release 2>&1 | tail -10
          node-gyp build --arch=arm64 --release 2>&1 | tail -30
        timeout-minutes: 30
        
      - name: Verify architecture
        run: |
          file node-pty/build/Release/pty.node 2>/dev/null || find /home/runner/work -name "pty.node" -exec file {} \;
          
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: node-pty/build/Release/pty.node
          retention-days: 30
          
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: node-pty/build/**/*.log
          retention-days: 7

name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    env:
      ANDROID_NDK_VERSION: r26b
      ANDROID_API: 21
      
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.ANDROID_NDK_VERSION }}-linux.zip -O ndk.zip
          unzip -q ndk.zip
          
      - name: Install node-addon-api headers
        run: |
          cd $HOME
          npm install node-addon-api
          ls node_modules/node-addon-api/
          
      - name: Cross-compile pty.node
        run: |
          NDK=$HOME/android-ndk/android-ndk-${{ env.ANDROID_NDK_VERSION }}
          SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          CLANG=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++
          LD=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-ld
          AR=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-ar
          
          mkdir -p build/Release/obj.target/pty
          
          # Compile pty.cc
          $CLANG \
            --sysroot=$SYSROOT \
            -D__ANDROID__ -DANDROID \
            -target aarch64-linux-android21 \
            -fPIC -fno-rtti \
            -I$HOME/node_modules/node-addon-api \
            -Isrc/unix \
            -Isrc \
            -o build/Release/obj.target/pty/pty.o \
            -c src/unix/pty.cc 2>&1 | tail -10
          
          # Create shared library
          aarch64-linux-android21-clang++ \
            --sysroot=$SYSROOT \
            -D__ANDROID__ -DANDROID \
            -target aarch64-linux-android21 \
            -shared -fPIC \
            -o build/Release/pty.node \
            build/Release/obj.target/pty/pty.o \
            -L$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/21 \
            -lc++_shared 2>&1 | tail -10
          
          file build/Release/pty.node
          
      - name: Create node module
        run: |
          mkdir -p module
          cp build/Release/pty.node module/
          cp node_modules/node-addon-api/*.h module/ 2>/dev/null || true
          cat > module/binding.gyp << 'EOF'
{
  "targets": [{
    "target_name": "pty",
    "sources": ["pty.node"]
  }]
}
EOF
          cat > module/package.json << 'EOF'
{
  "name": "@youshongping/node-pty-android-arm64",
  "version": "1.0.0",
  "main": "index.js"
}
EOF
          cat > module/index.js << 'EOF'
module.exports = require('./pty.node');
EOF
          tar -czvf pty-module.tar.gz module/
          
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: build/Release/pty.node
          retention-days: 30

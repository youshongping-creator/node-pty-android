name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd node-pty
          npm install
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -O ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r26b" >> $GITHUB_ENV
          
      - name: Build for Android ARM64
        run: |
          cd node-pty
          export ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r26b
          export PATH=$ANDROID_NDK_HOME:$PATH
          
          # Set up compiler
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          export CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++
          export LD=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld
          
          # Set up sysroot
          export SYSROOT=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          export CFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target arm64-v8a -fPIC -march=armv8-a"
          export CXXFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target arm64-v8a -fPIC -march=armv8-a -std=c++17"
          export LDFLAGS="--sysroot=$SYSROOT -target arm64-v8a -L$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android"
          
          export ARCH=arm64
          export TARGET_ARCH=arm64
          export npm_config_arch=arm64
          export npm_config_target_arch=arm64
          export npm_config_build_from_source=true
          export CMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          
          node-gyp configure --arch=arm64 --release 2>&1 | tail -20
          node-gyp build --arch=arm64 --release 2>&1 | tail -30
        timeout-minutes: 30
        
      - name: Find build output
        run: |
          find /home/runner/work/node-pty-android -name "*.node" -type f 2>/dev/null
          ls -la node-pty/build/Release/ 2>/dev/null || echo "No build directory"
          
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: |
            node-pty/build/Release/*.node
            node-pty/build/Release/obj.target/
          retention-days: 30
          
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-arm64
          path: |
            node-pty/build/Release/**/*.log
            node-pty/build/*.log
          retention-days: 7

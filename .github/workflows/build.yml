name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          ls -la $HOME/android-ndk/android-ndk-r26b/toolchains/llvm/prebuilt/
          
      - name: Install node-addon-api
        run: |
          cd $HOME
          npm install node-addon-api
          
      - name: Build for Android ARM64
        run: |
          NDK=$HOME/android-ndk/android-ndk-r26b
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          export LD=aarch64-linux-android-ld
          export AR=aarch64-linux-android-ar
          export RANLIB=aarch64-linux-android-ranlib
          export SYSROOT=$TOOLCHAIN/sysroot
          
          export CFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target aarch64-linux-android21 -fPIC -Wall"
          export CXXFLAGS="--sysroot=$SYSROOT -D__ANDROID__ -DANDROID -target aarch64-linux-android21 -fPIC -stdlib=libc++ -Wall"
          export LDFLAGS="--sysroot=$SYSROOT -target aarch64-linux-android21"
          export CPPFLAGS="--sysroot=$SYSROOT"
          
          cd node-pty
          npm install --ignore-scripts
          
          # Build manually with NDK
          mkdir -p build/Release/obj.target/pty
          
          $CXX $CXXFLAGS -Isrc/unix -Isrc -I$HOME/node_modules/node-addon-api \
            -o build/Release/obj.target/pty/pty.o \
            -c src/unix/pty.cc 2>&1
          
          $CXX -shared -fPIC -o build/Release/pty.node \
            build/Release/obj.target/pty/pty.o \
            -lc++_shared 2>&1
          
          file build/Release/pty.node
          
      - name: Verify and upload
        if: success()
        run: |
          file node-pty/build/Release/pty.node
          ls -la node-pty/build/Release/pty.node
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: node-pty/build/Release/pty.node
          retention-days: 30

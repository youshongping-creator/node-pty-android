name: Build node-pty for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout node-pty
        uses: actions/checkout@v4
        with:
          repository: microsoft/node-pty
          path: node-pty
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd node-pty
          npm install
          
      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++
          
      - name: Download Android NDK
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -O ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r26b" >> $GITHUB_ENV
          
      - name: Create standalone toolchain
        run: |
          export ANDROID_NDK=$HOME/android-ndk/android-ndk-r26b
          $ANDROID_NDK/build/tools/make-standalone-toolchain.sh \
            --arch=arm64 \
            --platform=android-21 \
            --install-dir=$HOME/android-toolchain
          echo "TOOLCHAIN=$HOME/android-toolchain" >> $GITHUB_ENV
          ls -la $HOME/android-toolchain/bin/
          
      - name: Build for Android ARM64
        run: |
          export PATH=$HOME/android-toolchain/bin:$PATH
          export CC=$HOME/android-toolchain/bin/aarch64-linux-android21-clang
          export CXX=$HOME/android-toolchain/bin/aarch64-linux-android21-clang++
          export LD=$HOME/android-toolchain/bin/ld.lld
          export AR=$HOME/android-toolchain/bin/aarch64-linux-android-ar
          export AS=$HOME/android-toolchain/bin/aarch64-linux-android21-clang
          export CFLAGS="-target aarch64-linux-android21 -fPIC"
          export CXXFLAGS="-target aarch64-linux-android21 -fPIC -stdlib=libc++"
          export LDFLAGS="-target aarch64-linux-android21"
          export sysroot=$HOME/android-toolchain/sysroot
          export ac_cv_func_getpwent=no
          export ac_cv_func_getpwnam=no
          export ac_cv_func_getpwuid=no
          
          cd node-pty
          npm run prebuild-install -- --arch=arm64 2>&1 || true
          node-gyp configure --arch=arm64 --release 2>&1 | tail -10
          node-gyp build --arch=arm64 --release 2>&1 | tail -20
        timeout-minutes: 30
        
      - name: Verify architecture
        run: |
          file node-pty/build/Release/pty.node 2>/dev/null || find /home/runner/work -name "pty.node" -exec file {} \;
          
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-android-arm64
          path: node-pty/build/Release/pty.node
          retention-days: 30
          
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: node-pty/build/**/*.log
          retention-days: 7
